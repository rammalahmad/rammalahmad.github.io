<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f5; min-height: 100vh;
}
.header {
  background: #fff; border-bottom: 1px solid #e0e0e0;
  padding: 32px 20px; text-align: center;
}
h1 { font-size: 32px; font-weight: 700; color: #111; }
.subtitle { font-size: 15px; color: #888; margin-top: 6px; }
.stats-bar {
  display: flex; justify-content: center; gap: 32px; margin-top: 16px;
  font-size: 13px; color: #666;
}
.stats-bar .stat-value { font-weight: 700; color: #111; font-size: 20px; display: block; }
.container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.card {
  background: #fff; border: 1px solid #e0e0e0; border-radius: 10px;
  padding: 20px; text-decoration: none; color: inherit;
  transition: all 0.2s; cursor: pointer;
}
.card:hover { border-color: #4a6cf7; box-shadow: 0 4px 16px rgba(74,108,247,0.1); transform: translateY(-1px); }
.card-title { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 10px; }
.card-stats { display: flex; gap: 16px; font-size: 12px; color: #888; margin-bottom: 10px; }
.card-stats span { display: flex; align-items: center; gap: 4px; }
.progress-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.pass-rate { font-size: 12px; color: #888; margin-top: 4px; text-align: right; }
.footer { text-align: center; padding: 24px; font-size: 12px; color: #bbb; }
.search-bar {
  width: 100%; background: #fff; border: 1px solid #ddd; border-radius: 8px;
  padding: 10px 16px; font-size: 14px; margin-bottom: 20px; outline: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.search-bar:focus { border-color: #4a6cf7; }
.search-bar::placeholder { color: #aaa; }
.search-wrap { position: relative; }
.search-results {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 20;
  background: #fff; border: 1px solid #ddd; border-radius: 0 0 8px 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12); max-height: 400px; overflow-y: auto;
  display: none;
}
.search-results.open { display: block; }
.sr-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  text-decoration: none; color: inherit; border-bottom: 1px solid #f0f0f0;
  transition: background 0.15s;
}
.sr-item:hover { background: #f5f7ff; }
.sr-item:last-child { border-bottom: none; }
.sr-badge { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sr-badge.pass { background: #52b788; }
.sr-badge.fail { background: #e06060; }
.sr-name { font-size: 13px; font-weight: 600; color: #222; }
.sr-book { font-size: 11px; color: #999; margin-left: auto; flex-shrink: 0; }
.sr-kind { font-size: 11px; color: #bbb; }
.sr-empty { padding: 14px 16px; font-size: 13px; color: #999; text-align: center; }
</style>
</head>

</div>

  <div class="grid" id="book-grid"></div>

const BOOKS = [{"slug": "HighDimensionalStatistics", "name": "High Dimensional Statistics", "total": 73, "passed": 65, "pass_rate": 0.89}];

let totalPass = 0;

BOOKS.forEach(book => {
  totalStmts += book.total;
  totalPass += book.pass_rate * book.total;

  const passColor = book.pass_rate >= 0.9 ? '#52b788'
    : book.pass_rate >= 0.7 ? '#e8943a'
    : '#e06060';

  const card = document.createElement('a');
  card.className = 'card';
  card.href = `/atlas/book/${book.slug}`;
  card.dataset.search = book.name.toLowerCase() + ' ' + book.slug.toLowerCase();
  card.innerHTML = `
    <div class="card-title">${book.name}</div>
    <div class="card-stats">
      <span>${book.total} statements</span>
      <span>${book.passed}/${book.total} passed</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${book.pass_rate * 100}%;background:${passColor}"></div>
    </div>
    <div class="pass-rate">${(book.pass_rate * 100).toFixed(1)}% pass rate</div>
  `;
  grid.appendChild(card);
});

document.getElementById('total-books').textContent = BOOKS.length;
document.getElementById('total-stmts').textContent = totalStmts.toLocaleString();
document.getElementById('avg-pass').textContent = (totalPass / totalStmts * 100).toFixed(1) + '%';

const searchInput = document.getElementById('stmt-search');
const searchResults = document.getElementById('search-results');

searchInput.oninput = function() {
  const q = this.value.toLowerCase().trim();
  if (!q || q.length < 2) {
    searchResults.classList.remove('open');
    searchResults.innerHTML = '';
    return;
  }
  const matches = ALL_STMTS.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.lean_declaration.toLowerCase().includes(q) ||
    s.description.toLowerCase().includes(q)
  ).slice(0, 20);
  if (matches.length === 0) {
    searchResults.innerHTML = '<div class="sr-empty">No results</div>';
  } else {
    searchResults.innerHTML = matches.map(s => `
      <a class="sr-item" href="/atlas/book/${s.book_slug}?open=${encodeURIComponent(s.lean_declaration)}">
        <div class="sr-badge ${s.passed ? 'pass' : 'fail'}"></div>
        <div>
          <div class="sr-name">${s.name}</div>
          <div class="sr-kind">${s.kind} &middot; ${s.lean_declaration}</div>
        </div>
        <span class="sr-book">${s.book_name}</span>
      </a>
    `).join('');
  }
  searchResults.classList.add('open');
};

searchInput.onblur = function() {
  setTimeout(() => searchResults.classList.remove('open'), 200);
};
searchInput.onfocus = function() {
  if (this.value.trim().length >= 2) this.oninput();
};
</script>
