      <div style="font-weight:600;margin-top:10px;margin-bottom:6px;">Selected</div>
      <div class=\"row\"><div class=\"swatch\" style=\"background:#4a6cf7;box-shadow:0 0 8px #4a6cf7;\"></div> Selected node (glowing)</div>
    `;
    // Glow selected
    if (selectedNode) {
      nodeSel.filter(d => d.name === selectedNode.name)
        .select('rect, ellipse').attr('filter', 'url(#glow)');
    }
  }

  function rebuildAsCircles() {
    nodeSel.each(function(d) {
      const el = d3.select(this);
      el.selectAll('*').remove();
      const r = nodeRadius(d);
      const fill = nodeFillColor(d);
      el.append('circle').attr('r', r).attr('fill', fill).attr('stroke', '#444').attr('stroke-width', 2);
    });
    // Re-add labels for evaluated nodes
    nodeSel.each(function(d) {
      if (!reportMap[d.name]) return;
      const el = d3.select(this);
      el.append('text').attr('class', 'node-label').attr('dy', nodeRadius(d) + 12).text(shortName(d.name));
    });
  }

  // ── Links ──
  const linkG = g.append('g');
  let linkSel = linkG.selectAll('line').data(currentEdges)
    .join('line')
    .attr('stroke', '#e8943a').attr('stroke-opacity', 0.35).attr('stroke-width', 1.5)
    .attr('marker-end', 'url(#arrow-proof)');

  // ── Nodes ──
  const nodeG = g.append('g');

  let nodeSel = nodeG.selectAll('g.node').data(nodeArray, d => d.name)
    .join('g').attr('class', 'node').style('cursor', 'pointer');

  nodeSel.each(function(d) {
    const el = d3.select(this);
    const r = nodeRadius(d);
    const fill = nodeFillColor(d);
    el.append('circle').attr('r', r).attr('fill', fill).attr('stroke', '#444').attr('stroke-width', 2);
  });

  // ── Labels ──
  nodeSel.each(function(d) {
    if (!reportMap[d.name]) return;
    const el = d3.select(this);
    const label = shortName(d.name);
    el.append('text').attr('class', 'node-label').attr('dy', nodeRadius(d) + 12).text(label);
  });

  // ── Tooltip ──
  const tooltip = document.getElementById('tooltip');
  nodeSel.on('mouseenter', (e, d) => {
    const r = reportMap[d.name];
    let html = `<strong>${shortName(d.name)}</strong>`;
    html += `<br><span style="color:#888">${d.kind}`;
    if (r) html += ` · ${r.location || ''}`;
    html += '</span>';
    if (r) {
      html += `<br><span style="color:${r.passed ? '#2d6a4f' : '#992222'};font-weight:600">${r.passed ? 'PASS' : 'FAIL'}</span>`;
    }
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
  }).on('mousemove', e => {
    tooltip.style.left = (e.pageX + 14) + 'px';
    tooltip.style.top = (e.pageY - 12) + 'px';
  }).on('mouseleave', () => { tooltip.style.display = 'none'; });

  // ── Click behavior ──
  // Single click: if already isolated, just show detail + move glow. Otherwise, isolate.
  // Double click: re-isolate around the clicked node.
  nodeSel.on('click', (e, d) => {
    e.stopPropagation();
    if (isolatedSet) {
      // Already in cone view — just update detail + glow
      selectedNode = d;
      showDetail(d);
      nodeSel.select('rect, ellipse, circle').attr('filter', null);
      d3.select(e.currentTarget).select('rect, ellipse, circle').attr('filter', 'url(#glow)');
      return;
    }
    // Not isolated — isolate this node's cone
    selectedNode = d;
    showDetail(d);
    isolatedSet = getConnected(d);
    document.getElementById('reset-btn').style.display = '';
    clearHighlight();
    updateVisibility();
    currentEdges = buildEdges(edgeMode);
    const edgeColor = edgeMode === 'statement' ? '#4a6cf7' : '#e8943a';
    const marker = edgeMode === 'statement' ? 'url(#arrow-stmt)' : 'url(#arrow-proof)';
    linkSel = linkSel.data(currentEdges, d2 => {
      const sn = typeof d2.source === 'object' ? d2.source.name : d2.source;
      const tn = typeof d2.target === 'object' ? d2.target.name : d2.target;
      return sn + '→' + tn;
    }).join('line')
      .attr('stroke', edgeColor).attr('stroke-opacity', 0.35).attr('stroke-width', 1.5)
      .attr('marker-end', marker);
    applyHierarchy();
    rebuildAsShapes();
  });

  nodeSel.on('dblclick', (e, d) => {
    e.stopPropagation();
    // Re-isolate around this node
    selectedNode = d;
    showDetail(d);
    isolatedSet = getConnected(d);
    document.getElementById('reset-btn').style.display = '';
    clearHighlight();
    updateVisibility();
    currentEdges = buildEdges(edgeMode);
    const edgeColor = edgeMode === 'statement' ? '#4a6cf7' : '#e8943a';
    const marker = edgeMode === 'statement' ? 'url(#arrow-stmt)' : 'url(#arrow-proof)';
    linkSel = linkSel.data(currentEdges, d2 => {
      const sn = typeof d2.source === 'object' ? d2.source.name : d2.source;
      const tn = typeof d2.target === 'object' ? d2.target.name : d2.target;
      return sn + '→' + tn;
    }).join('line')
      .attr('stroke', edgeColor).attr('stroke-opacity', 0.35).attr('stroke-width', 1.5)
      .attr('marker-end', marker);
    applyHierarchy();
    rebuildAsShapes();
  });

  svg.on('click', () => {
    selectedNode = null;
    document.getElementById('detail-panel').classList.remove('open');
    if (isolatedSet) {
      exitIsolation();
    } else {
      clearHighlight();
    }
  });

  // ── Simulation (force layout) ──
  const sim = d3.forceSimulation(nodeArray)
    .force('link', d3.forceLink(currentEdges).id(d => d.name).distance(80).strength(0.15))
    .force('charge', d3.forceManyBody().strength(-40).distanceMax(300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .alphaDecay(0.05)
    .velocityDecay(0.4)
    .on('tick', ticked);

  function ticked() {
    linkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  }

  // ── Hierarchy layout for isolated cone (computed on-the-fly for cone nodes) ──
  function applyHierarchy() {
    sim.stop();
    const coneNames = isolatedSet;
    if (!coneNames || coneNames.size === 0) return;

    const depKey = evalOnly
      ? (edgeMode === 'statement' ? 'eval_statement_deps' : 'eval_proof_deps')
      : (edgeMode === 'statement' ? 'statement_deps' : 'proof_deps');

    // Compute layers via longest-path for cone nodes only
    const layers = {};
    function getLayer(name, stack) {
      if (layers[name] !== undefined) return layers[name];
      if (!stack) stack = new Set();
      if (stack.has(name) || !coneNames.has(name)) { layers[name] = 0; return 0; }
      stack.add(name);
      const node = nodeIndex[name] !== undefined ? nodeArray[nodeIndex[name]] : null;
      if (!node) { layers[name] = 0; return 0; }
      const deps = (node[depKey] || []).filter(d => coneNames.has(d));
      if (deps.length === 0) { layers[name] = 0; }
      else { layers[name] = 1 + Math.max(...deps.map(d => getLayer(d, stack))); }
      stack.delete(name);
      return layers[name];
    }
    coneNames.forEach(name => getLayer(name));

    // Group by layer and assign positions
    const byLayer = {};
    coneNames.forEach(name => {
      const layer = layers[name] || 0;
      if (!byLayer[layer]) byLayer[layer] = [];
      byLayer[layer].push(name);
    });

    const centerX = width / 2;
    const maxLayer = Math.max(...Object.keys(byLayer).map(Number));
    const centerY = height / 2;
    const layerSpacing = 120;

    Object.entries(byLayer).forEach(([layer, names]) => {
      const y = centerY - (maxLayer / 2 - Number(layer)) * layerSpacing;
      // Compute dynamic spacing based on widest node label in this layer
      let maxNodeWidth = 0;
      names.forEach(name => {
        const label = coneShortName(name);
        maxNodeWidth = Math.max(maxNodeWidth, label.length * 6 + 30);
      });
      const nodeSpacing = Math.max(maxNodeWidth + 20, 100);
      const totalWidth = (names.length - 1) * nodeSpacing;
      const startX = centerX - totalWidth / 2;
      names.forEach((name, i) => {
        const node = nodeArray[nodeIndex[name]];
        if (node) {
          node.x = startX + i * nodeSpacing;
          node.y = y;
          node.fx = node.x;
          node.fy = node.y;
        }
      });
    });

    nodeSel.transition().duration(500)
      .attr('transform', d => `translate(${d.x},${d.y})`);
    linkSel.transition().duration(500)
      .attr('x1', d => { const n = typeof d.source === 'object' ? d.source : nodeArray[nodeIndex[d.source]]; return n ? n.x : 0; })
      .attr('y1', d => { const n = typeof d.source === 'object' ? d.source : nodeArray[nodeIndex[d.source]]; return n ? n.y : 0; })
      .attr('x2', d => { const n = typeof d.target === 'object' ? d.target : nodeArray[nodeIndex[d.target]]; return n ? n.x : 0; })
      .attr('y2', d => { const n = typeof d.target === 'object' ? d.target : nodeArray[nodeIndex[d.target]]; return n ? n.y : 0; });
  }

  // ── Drag (only when not isolated) ──
  nodeSel.call(d3.drag()
    .on('start', (e, d) => { if (isolatedSet) return; if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { if (isolatedSet) return; d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { if (isolatedSet) return; if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
  );

  // ── Edge toggle ──
  document.querySelectorAll('.toggle-btn[data-edge]').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.toggle-btn[data-edge]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      edgeMode = btn.dataset.edge;
      switchEdges();
    };
  });

  function switchEdges() {
    currentEdges = buildEdges(edgeMode);
    const edgeColor = edgeMode === 'statement' ? '#4a6cf7' : '#e8943a';
    const marker = edgeMode === 'statement' ? 'url(#arrow-stmt)' : 'url(#arrow-proof)';
    linkSel = linkSel.data(currentEdges, d => {
      const sn = typeof d.source === 'object' ? d.source.name : d.source;
      const tn = typeof d.target === 'object' ? d.target.name : d.target;
      return sn + '→' + tn;
    }).join('line')
      .attr('stroke', edgeColor).attr('stroke-opacity', 0.35).attr('stroke-width', 1.5)
      .attr('marker-end', marker);
    if (isolatedSet) {
      applyHierarchy();
    } else {
      sim.force('link', d3.forceLink(currentEdges).id(d => d.name).distance(80).strength(0.15));
      sim.alpha(0.3).restart();
    }
    if (selectedNode) highlightNode(selectedNode);
  }

  // ── Eval toggle ──
  document.getElementById('eval-toggle').onclick = function() {
    evalOnly = !evalOnly;
    this.classList.toggle('active');
    updateVisibility();
    switchEdges();
  };

  // ── Search ──
  document.getElementById('search-input').oninput = function() {
    searchTerm = this.value.toLowerCase();
    updateVisibility();
  };

  function updateVisibility() {
    nodeSel.style('display', d => isVisible(d) ? null : 'none');
    linkSel.style('display', d => {
      const s = typeof d.source === 'object' ? d.source : nodes[nodeIndex[d.source]];
      const t = typeof d.target === 'object' ? d.target : nodes[nodeIndex[d.target]];
      return (s && isVisible(s) && t && isVisible(t)) ? null : 'none';
    });
    updateStats();
  }

  let isolatedSet = null;

  function getConnected(d) {
    const depKey = evalOnly
      ? (edgeMode === 'statement' ? 'eval_statement_deps' : 'eval_proof_deps')
      : (edgeMode === 'statement' ? 'statement_deps' : 'proof_deps');
    // Upward only: everything this node depends on (transitive)
    const cone = new Set([d.name]);
    const upQueue = [...(d[depKey] || [])];
    while (upQueue.length) {
      const name = upQueue.pop();
      if (cone.has(name)) continue;
      cone.add(name);
      const node = nodeIndex[name] !== undefined ? nodeArray[nodeIndex[name]] : null;
      if (node) {
        (node[depKey] || []).forEach(dep => { if (!cone.has(dep)) upQueue.push(dep); });
      }
    }
    return cone;
  }

  function isVisible(d) {
    if (isolatedSet && !isolatedSet.has(d.name)) return false;
    if (evalOnly && !d.evaluated) return false;
    if (searchTerm) {
      const sn = shortName(d.name).toLowerCase();
      return d.name.toLowerCase().includes(searchTerm) || sn.includes(searchTerm);
    }
    return true;
  }

  // ── Highlight ──
  function highlightNode(d) {
    const connected = getConnected(d);

    nodeSel.style('opacity', n => connected.has(n.name) ? 1 : 0.08);
    linkSel.style('opacity', l => {
      const sn = typeof l.source === 'object' ? l.source.name : l.source;
      const tn = typeof l.target === 'object' ? l.target.name : l.target;
      // Only highlight edges within the upward cone
      return (connected.has(sn) && connected.has(tn)) ? 1 : 0.03;
    }).attr('stroke-width', l => {
      const sn = typeof l.source === 'object' ? l.source.name : l.source;
      const tn = typeof l.target === 'object' ? l.target.name : l.target;
      return (connected.has(sn) && connected.has(tn)) ? 3 : 1.5;
    });
  }

  function clearHighlight() {
    nodeSel.style('opacity', 1);
    linkSel.style('opacity', 1).attr('stroke-width', 1.5);
  }

  // ── Reset from isolation ──
  document.getElementById('reset-btn').onclick = function() {
    exitIsolation();
  };

  function exitIsolation() {
    isolatedSet = null;
    selectedNode = null;
    document.getElementById('reset-btn').style.display = 'none';
    document.getElementById('detail-panel').classList.remove('open');
    // Rebuild circles
    rebuildAsCircles();
    // Restore original legend
    document.getElementById('legend').innerHTML = `
      <div style="font-weight:600;margin-bottom:6px;">Nodes</div>
      <div class="row"><div class="swatch" style="background:#52b788;"></div> Passed evaluation</div>
      <div class="row"><div class="swatch" style="background:#e06060;"></div> Failed evaluation</div>
      <div class="row"><div class="swatch" style="background:#bbb;"></div> Not evaluated</div>
      <div style="font-weight:600;margin-top:10px;margin-bottom:6px;">Edges</div>
      <div class="row"><div style="width:20px;height:2px;background:#4a6cf7;"></div> Statement dep</div>
      <div class="row"><div style="width:20px;height:2px;background:#e8943a;"></div> Statement + Proof dep</div>
      <div style="font-weight:600;margin-top:10px;margin-bottom:6px;">Tip</div>
      <div class="row" style="color:#888;">Click a node to isolate its dependency cone</div>
    `;
    // Release fixed positions and restart force
    nodeArray.forEach(n => { n.fx = null; n.fy = null; });
    clearHighlight();
    updateVisibility();
    currentEdges = buildEdges(edgeMode);
    const edgeColor = edgeMode === 'statement' ? '#4a6cf7' : '#e8943a';
    const marker = edgeMode === 'statement' ? 'url(#arrow-stmt)' : 'url(#arrow-proof)';
    linkSel = linkSel.data(currentEdges, d => {
      const sn = typeof d.source === 'object' ? d.source.name : d.source;
      const tn = typeof d.target === 'object' ? d.target.name : d.target;
      return sn + '→' + tn;
    }).join('line')
      .attr('stroke', edgeColor).attr('stroke-opacity', 0.35).attr('stroke-width', 1.5)
      .attr('marker-end', marker);
    sim.force('link', d3.forceLink(currentEdges).id(d => d.name).distance(80).strength(0.15));
    sim.alpha(0.8).restart();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && isolatedSet) exitIsolation();
  });

  // ── Detail panel ──
  function showDetail(d) {
    const panel = document.getElementById('detail-panel');
    panel.classList.add('open');
    const r = reportMap[d.name];

    document.getElementById('d-name').innerHTML = (r ? r.name : shortName(d.name))
      + (r ? `<span class="badge ${r.passed ? 'pass' : 'fail'}">${r.passed ? 'Pass' : 'Fail'}</span>` : '');
    const metaParts = [d.kind];
    if (r && r.location) metaParts.push(r.location);
    if (r && r.lean_file) metaParts.push(r.lean_file);
    document.getElementById('d-meta').textContent = metaParts.join(' · ');

    let body = '';
    if (r) {
      // Doc-gen4 link
      if (DATA.docs_base_url && r.lean_file) {
        const docPath = r.lean_file.replace('High_Dimensional_Statistics/', 'Atlas/HighDimensionalStatistics/code/').replace('.lean', '.html');
        const docUrl = DATA.docs_base_url + '/' + docPath;
        body += `<a href="${docUrl}" target="_blank" style="display:inline-block;margin-bottom:8px;margin-right:8px;padding:5px 12px;background:#4a6cf7;color:#fff;border-radius:6px;font-size:13px;text-decoration:none;">View in doc-gen4 &rarr;</a>`;
      }
      body += '<div class="section-title">Informal Statement</div>';
      body += `<div class="informal-box" id="informal-math">${formatMathText(r.description)}</div>`;

      body += '<div class="section-title">Formal Statement</div>';
      body += `<div class="formal-box">${highlightLean(r.lean_statement || d.lean_statement || r.lean_declaration)}</div>`;

      body += '<div class="section-title">Scores</div>';
      for (const [key, max] of Object.entries(SCORE_MAX)) {
        const val = r.scores[key];
        const pct = (val / max) * 100;
        const color = SCORE_COLORS[key];
        const label = key.replace(/_/g, ' ');
        body += `<div class="score-row">
          <span class="score-label">${label}</span>
          <div class="score-bar-bg"><div class="score-bar" style="width:${pct}%;background:${color}"></div></div>
          <span class="score-value">${val}/${max}</span>
        </div>`;
      }

      body += '<div class="section-title">Feedback</div>';
      body += `<div class="feedback-box">${escapeHtml(r.feedback)}</div>`;
    } else {
      // Doc-gen4 link (available for all nodes since they're all in doc-gen)
      if (DATA.docs_base_url && d.module) {
        const docPath = d.module.replace(/\./g, '/') + '.html';
        const docUrl = DATA.docs_base_url + '/' + docPath + '#' + d.name;
        body += `<a href="${docUrl}" target="_blank" style="display:inline-block;margin-bottom:12px;padding:5px 12px;background:#4a6cf7;color:#fff;border-radius:6px;font-size:13px;text-decoration:none;">View in doc-gen4 &rarr;</a>`;
      }
      if (d.lean_statement) {
        body += `<div class="section-title">Formal Statement</div>`;
        body += `<div class="formal-box">${highlightLean(d.lean_statement)}</div>`;
      }
      body += `<div class="section-title">Declaration Info</div>`;
      body += `<div class="formal-box">${escapeHtml(d.name)}<br>Kind: ${d.kind}<br>Module: ${d.module}</div>`;
    }

    document.getElementById('d-body').innerHTML = body;

    const mathEl = document.getElementById('informal-math');
    if (mathEl) {
      renderMathInElement(mathEl, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false},
          {left: '\\(', right: '\\)', display: false},
          {left: '\\[', right: '\\]', display: true}
        ],
        throwOnError: false
      });
    }
  }

  function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fixDoubleBraces(s) {
    if (!s) return '';
    return s.replace(/\{\{/g, '{').replace(/\}\}/g, '}');
  }

  function formatMathText(s) {
    if (!s) return '';
    let text = s;
    // Fix double braces from f-string escaping
    text = text.replace(/\{\{/g, '{').replace(/\}\}/g, '}');
    // Split into math ($...$) and non-math segments
    // Process only non-math segments for ^/_ conversion
    const parts = [];
    let i = 0;
    while (i < text.length) {
      if (text[i] === '$') {
        const display = text[i + 1] === '$';
        const delim = display ? '$$' : '$';
        const start = i;
        i += delim.length;
        while (i < text.length) {
          if (text.slice(i, i + delim.length) === delim) { i += delim.length; break; }
          i++;
        }
        // Keep math segments as-is (KaTeX will handle them)
        parts.push({ math: true, text: text.slice(start, i) });
      } else {
        const start = i;
        while (i < text.length && text[i] !== '$') i++;
        parts.push({ math: false, text: text.slice(start, i) });
      }
    }
    // Process non-math parts: escape HTML and convert ^/_ to sup/sub
    function replaceBraced(str, prefix, tag) {
      let result = '';
      let j = 0;
      while (j < str.length) {
        if (str[j] === prefix && j + 1 < str.length && (str[j + 1] === '{' || str[j + 1] === '(')) {
          const open = str[j + 1];
          const close = open === '{' ? '}' : ')';
          let depth = 0;
          let k = j + 1;
          while (k < str.length) {
            if (str[k] === open) depth++;
            else if (str[k] === close) { depth--; if (depth === 0) break; }
            k++;
          }
          if (depth === 0) {
            const inner = str.slice(j + 2, k);
            const wrap = open === '(' ? `(${inner})` : inner;
            result += `<${tag}>${wrap}</${tag}>`;
            j = k + 1;
            continue;
          }
        }
        result += str[j];
        j++;
      }
      return result;
    }
    return parts.map(p => {
      if (p.math) return escapeHtml(p.text);
      let h = escapeHtml(p.text);
      h = replaceBraced(h, '^', 'sup');
      h = replaceBraced(h, '_', 'sub');
      return h;
    }).join('');
  }

  function highlightLean(s) {
    if (!s) return '';
    let h = escapeHtml(s);
    // Highlight keywords
    h = h.replace(/\b(theorem|lemma|def|noncomputable|instance|structure|class|inductive|axiom|where|variable|namespace|section|end|open|import|sorry|by)\b/g,
      '<span style="color:#7c3aed;font-weight:600">$1</span>');
    // Highlight types
    h = h.replace(/\b(Prop|Type|Sort|Nat|Int|Real|Bool|True|False|Set|Finset)\b/g,
      '<span style="color:#0369a1">$1</span>');
    // Highlight symbols
    h = h.replace(/(→|←|↔|∀|∃|λ|⟨|⟩|∧|∨|¬|≤|≥|≠|∈|∉|⊆|⊂|∪|∩|⊥|⊤|∅)/g,
      '<span style="color:#c2410c">$1</span>');
    return h;
  }

  document.getElementById('close-detail').onclick = () => {
    document.getElementById('detail-panel').classList.remove('open');
    selectedNode = null;
    clearHighlight();
  };

  function updateStats() {
    const vis = nodeArray.filter(isVisible);
    const evalVis = vis.filter(n => reportMap[n.name]);
    document.getElementById('stats-bar').textContent =
      `${vis.length} nodes · ${evalVis.length} evaluated · ${edgeMode} edges${isolatedSet ? ' · isolated' : ''}`;
  }
  updateStats();

  // ── Auto-isolate from URL param ──
  const isolateParam = new URLSearchParams(window.location.search).get('isolate');
  if (isolateParam && nodeIndex[isolateParam] !== undefined) {
    const targetNode = nodeArray[nodeIndex[isolateParam]];
    selectedNode = targetNode;
    showDetail(targetNode);
    isolatedSet = getConnected(targetNode);
    document.getElementById('reset-btn').style.display = '';
    clearHighlight();
    updateVisibility();
    currentEdges = buildEdges(edgeMode);
    const edgeColor = edgeMode === 'statement' ? '#4a6cf7' : '#e8943a';
    const marker = edgeMode === 'statement' ? 'url(#arrow-stmt)' : 'url(#arrow-proof)';
    linkSel = linkSel.data(currentEdges, d2 => {
      const sn = typeof d2.source === 'object' ? d2.source.name : d2.source;
      const tn = typeof d2.target === 'object' ? d2.target.name : d2.target;
      return sn + '→' + tn;
    }).join('line')
      .attr('stroke', edgeColor).attr('stroke-opacity', 0.35).attr('stroke-width', 1.5)
      .attr('marker-end', marker);
    applyHierarchy();
    rebuildAsShapes();
  }

})();
</script>
</body>
</html>
